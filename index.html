<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page not found · GitHub Pages</title>
    <style>
        /* GitHub 404 페이지 스타일 위장 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background-color: #f9f9f9; color: #333; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .error-container { max-width: 800px; padding: 20px; }
        h1 { font-size: 80px; font-weight: 500; margin: 0; color: #24292e; }
        p { font-size: 18px; color: #586069; margin: 10px 0 30px; }
        .sub-text { font-size: 14px; color: #6a737d; line-height: 1.5; }
        .sub-text a { color: #0366d6; text-decoration: none; }
        
        /* 내부 실행 전용 컨테이너 (유튜브, 게임, 채팅 전용) */
        #secretFrameContainer { display: none; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; background: white; z-index: 9999; }
        #secretFrameContainer iframe { width: 100%; height: 100%; border: none; }

        /* 안내 전용 모달 창 */
        #infoContainer { display: none; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; background: #181818; color: white; z-index: 9998; box-sizing: border-box; padding: 40px; text-align: left; font-size: 18px; overflow-y: auto; }
        .btn-youtube { display: inline-block; padding: 12px 24px; background-color: #ff0000; color: white; text-decoration: none; font-weight: bold; border-radius: 4px; margin-bottom: 20px; font-size: 16px; cursor: pointer; border: none; }
        .code-box { background: #2a2a2a; padding: 20px; border-radius: 8px; font-family: monospace; line-height: 1.8; color: #00ffcc; font-size: 15px; }
    </style>
</head>
<body>

    <div class="error-container" id="fake404">
        <h1>404</h1>
        <p><strong>There isn't a GitHub Pages site here.</strong></p>
        <div class="sub-text">
            If you're trying to publish one, read the <a href="https://docs.github.com/pages">GitHub Pages documentation</a> to learn how to set up your site.<br>
            <span style="color:#bbb; font-size:11px; margin-top:20px; display:block;">GitHub Status — @githubstatus</span>
        </div>
    </div>

    <div id="secretFrameContainer">
        <iframe id="secretTargetFrame" src=""></iframe>
    </div>

    <div id="infoContainer">
        <div id="infoContent"></div>
    </div>

    <script>
        let inputBuffer = "";
        
        // 원상복구된 복구용 클라우드플레어 워커 주소
        const myWorkerUrl = "https://gentle-shadow-d519.w0nminzus.workers.dev"; 

        window.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                handleSecretCode(inputBuffer);
                inputBuffer = ""; 
            } else {
                if (e.key.length === 1) {
                    inputBuffer += e.key;
                }
            }
        });

        // 거대 IT 기업 전용: 주소창은 안 보이지만 방화벽을 100% 뚫고 화면 깨짐이 없는 팝업창 실행 함수
        function openStealthWindow(url) {
            const width = window.screen.width;
            const height = window.screen.height;
            window.open(url, '_blank', `width=${width},height=${height},toolbar=no,location=no,directories=no,status=no,menubar=no,scrollbars=yes,resizable=yes`);
        }

        function handleSecretCode(code) {
            const frameContainer = document.getElementById("secretFrameContainer");
            const targetFrame = document.getElementById("secretTargetFrame");
            const infoContainer = document.getElementById("infoContainer");
            const infoContent = document.getElementById("infoContent");
            const fake404 = document.getElementById("fake404");

            frameContainer.style.display = "none";
            infoContainer.style.display = "none";
            targetFrame.src = "";

            switch (code) {
                case "deviluseslist":
                    fake404.style.display = "none";
                    infoContainer.style.display = "block";
                    infoContent.innerHTML = `
                        <h2>🤫 비밀 암호 포털 명령어 목록 (유튜브 완전 복구판)</h2>
                        <p>위장 화면 상태에서 아래 암호를 타이핑하고 엔터(Enter)를 누르세요.</p>
                        <div class="code-box">
                            deviluseslist : 현재 마스터 암호 목록 확인<br>
                            devilusesgpt : ChatGPT 우회 연결 (주소창 없는 팝업형태 구동)<br>
                            devilusesclaude : Claude AI 우회 연결 (주소창 없는 팝업형태 구동)<br>
                            devilusesinstagram : 인스타그램 우회 연결 (주소창 없는 팝업형태 구동)<br>
                            devilusesyoutube : 유튜브 우회 연결 가이드 및 버튼 활성화 (완벽 복구)<br>
                            devilusesob : 오션브롤 게임 연결 (사이트 내부 고정)<br>
                            devilusesduck : DuckMaths 우회 게임 사이트 연결 (사이트 내부 고정)<br>
                            devilusestoon : 네이버 웹툰 모바일 연결 (주소창 없는 팝업형태 구동)<br>
                            deviluseschat : tlk.io 비밀 채팅방 연결 (사이트 내부 고정)
                        </div>
                    `;
                    break;

                // 하얗게 변하는 에러가 있는 거대 사이트들은 주소창과 툴바를 숨긴 팝업창으로 안전 이동 (방화벽 100% 통과)
                case "devilusesgpt":
                    openStealthWindow("https://duckduckgo.com/chat"); // 학교 방화벽 프리 패스 AI 주소
                    break;

                case "devilusesclaude":
                    openStealthWindow("https://huggingface.co/chat"); // 개발자용 주소라 방화벽이 안막음
                    break;

                case "devilusesinstagram":
                    openStealthWindow("https://www.picuki.com"); // SNS 차단 차단용 대체 인스타 뷰어
                    break;

                // 우리의 심장, 유튜브 포털 원점 완벽 복구
                case "devilusesyoutube":
                    fake404.style.display = "none";
                    infoContainer.style.display = "block";
                    infoContent.innerHTML = `
                        <h2>📺 유튜브 우회 포털</h2>
                        <button class="btn-youtube" onclick="openYoutubeProxy()">[youtube로 연결]</button>
                        <div class="code-box" style="color: #ff9900; font-size: 16px;">
                            💡 안내 문구:<br>
                            "이비스 페인트에서 설정 -> 이비스어카운트 -> X로 변경 -> 이용 약관 -> 밑으로 스크롤"
                        </div>
                    `;
                    break;

                // 내부 액자(iframe) 구동에 아무런 문제가 없는 우회 허브 및 게임, 채팅방
                case "devilusesob":
                    fake404.style.display = "none";
                    frameContainer.style.display = "block";
                    targetFrame.src = "https://apple-melon.github.io/oceanbrawl/";
                    break;

                case "devilusesduck":
                    fake404.style.display = "none";
                    frameContainer.style.display = "block";
                    targetFrame.src = "https://duckmath.org/";
                    break;

                case "devilusestoon":
                    openStealthWindow("https://m.comic.naver.com"); // 네이버 웹툰 완벽 구동
                    break;

                case "deviluseschat":
                    fake404.style.display = "none";
                    frameContainer.style.display = "block";
                    targetFrame.src = "https://tlk.io/secret-class-room";
                    break;

                default:
                    break;
            }
        }

        function openYoutubeProxy() {
            document.getElementById("infoContainer").style.display = "none";
            document.getElementById("secretFrameContainer").style.display = "block";
            document.getElementById("secretTargetFrame").src = myWorkerUrl;
        }
    </script>
</body>
</html>
