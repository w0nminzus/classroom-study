<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Classroom</title>
    <style>
        body { margin: 0; font-family: 'Roboto', Arial, sans-serif; background-color: #f8f9fa; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 64px; border-bottom: 1px solid #e0e0e0; background: #fff; }
        .logo-area { display: flex; align-items: center; gap: 12px; font-size: 22px; color: #5f6368; font-weight: 400; }
        .menu-icon { font-size: 24px; cursor: pointer; padding: 8px; }
        .server-selector { display: flex; gap: 8px; align-items: center; }
        .btn { padding: 8px 16px; border: none; background-color: #1a73e8; color: white; border-radius: 4px; cursor: pointer; font-weight: 500; font-size: 14px; }
        .btn:hover { background-color: #1557b0; }
        .container { flex: 1; padding: 24px; display: flex; justify-content: center; align-items: flex-start; }
        .classroom-card { width: 100%; max-width: 1280px; height: calc(100vh - 140px); background: #fff; border: 1px solid #dadce0; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .card-header { padding: 12px 24px; background: #e8f0fe; border-bottom: 1px solid #dadce0; color: #1967d2; font-size: 14px; font-weight: 500; display: flex; justify-content: space-between; }
        iframe { width: 100%; flex: 1; border: none; background: #fff; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <span class="menu-icon">☰</span>
            <span>Google Classroom</span>
        </div>
        <div class="server-selector">
            <button class="btn" onclick="changeServer('https://invidious.flokinet.to')">우회 통로 A</button>
            <button class="btn" onclick="changeServer('https://iv.melmac.space')">우회 통로 B</button>
            <button class="btn" onclick="changeServer('https://invidious.nerdvpn.de')">우회 통로 C</button>
        </div>
    </header>

    <div class="container">
        <div class="classroom-card">
            <div class="card-header">
                <span>과제 자료: 원격 교육 시청각 교재 학습</span>
                <span id="status-text" style="color: #5f6368;">안전 모드 작동 중</span>
            </div>
            <iframe id="classroom-frame" src="https://invidious.flokinet.to" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        function changeServer(url) {
            const frame = document.getElementById('classroom-frame');
            const status = document.getElementById('status-text');
            status.innerText = "통로 전환 중...";
            frame.src = url;
            setTimeout(() => { status.innerText = "안전 모드 작동 중"; }, 1000);
        }
    </script>
</body>
</html>
