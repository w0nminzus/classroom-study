<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Classroom</title>
    <style>
        body { margin: 0; font-family: 'Roboto', Arial, sans-serif; background-color: #f8f9fa; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 64px; border-bottom: 1px solid #e0e0e0; background: #fff; }
        .logo-area { display: flex; align-items: center; gap: 12px; font-size: 22px; color: #5f6368; font-weight: 400; }
        .menu-icon { font-size: 24px; cursor: pointer; padding: 8px; }
        .container { flex: 1; padding: 24px; display: flex; justify-content: center; align-items: flex-start; }
        .classroom-card { width: 100%; max-width: 1280px; height: calc(100vh - 140px); background: #fff; border: 1px solid #dadce0; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        .card-header { padding: 12px 24px; background: #e8f0fe; border-bottom: 1px solid #dadce0; color: #1967d2; font-size: 14px; font-weight: 500; }
        /* 절대 연결 거부가 뜨지 않는 마법의 영역 */
        iframe { width: 100%; flex: 1; border: none; background: #fff; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <span class="menu-icon">☰</span>
            <span>Google Classroom</span>
        </div>
        <div style="color: #5f6368; font-size: 14px; font-weight: 500;">과제 수행 전용 브라우저</div>
    </header>

    <div class="container">
        <div class="classroom-card">
            <div class="card-header">
                <span>과제 자료: 원격 교육 시청각 교재 학습 (보안 암호화 모드)</span>
            </div>
            <iframe id="classroom-frame" src="https://www.croxyproxy.com" allowfullscreen></iframe>
        </div>
    </div>

</body>
</html>
